<!-- templates/result.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Quiz Results</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="box center">
    <h1>Quiz Finished!</h1>
    <div class="score">{{ score }} / {{ total }}</div>
    <p class="info">{{ message }}</p>
    <a href="/" class="btn">Try Again</a>
  </div>
</body>
</html>
